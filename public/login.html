<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Fibra+ Hub</title>
  <link rel="stylesheet" href="style.css">
  <script src="00-fix-definitivo.js"></script>
  <script src="supabase-client.js"></script>
  <script src="auth-painel.js"></script>
</head>
<body class="login-body">
  <main class="login-wrap">
    <section class="login-card">
      <div class="logo-wrap">
        <div class="brand"><span class="fibra">Fibra</span><span class="brand-dot"></span><span class="plus">+</span></div>
        <div class="slogan">HUB DE CONTROLE</div>
      </div>

      <h2>Acessar Painel</h2>
      
      <label>Usuário</label>
      <input id="loginUsuario" type="text" placeholder="seu usuário" autocomplete="username">

      <label>Senha</label>
      <input id="loginSenha" type="password" placeholder="sua senha" autocomplete="current-password">

      <button type="button" onclick="entrarPainel()">Entrar</button>

      <div id="loginMsg" class="import-result">Aguardando login.</div>
    </section>
  </main>

<script>
async function entrarPainel(){
  const msg = document.getElementById("loginMsg");
  try{
    msg.innerHTML = "Verificando acesso...";
    await FibraAuth.login(
      document.getElementById("loginUsuario").value,
      document.getElementById("loginSenha").value
    );
    msg.innerHTML = "Acesso liberado. Redirecionando...";
    location.href = "dashboard.html";
  }catch(e){
    msg.innerHTML = "❌ " + e.message;
  }
}

document.addEventListener("keydown", function(e){
  if(e.key === "Enter") entrarPainel();
});
</script>
<script src="efi-status.js"></script>
<script src="efi-boleto-importado.js"></script>
</body>
</html>
